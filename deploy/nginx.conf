# /etc/nginx/sites-available/infinitee
# Symlink: ln -s /etc/nginx/sites-available/infinitee /etc/nginx/sites-enabled/

upstream infinitee_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (use certbot: certbot --nginx -d yourdomain.com) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            DENY;
    add_header X-Content-Type-Options     nosniff;
    add_header X-XSS-Protection           "1; mode=block";
    add_header Referrer-Policy            "strict-origin-when-cross-origin";

    # ── Static Files ──────────────────────────────────────────────────────────
    location /static/ {
        alias /path/to/infinitee_app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location /media/ {
        alias /path/to/infinitee_app/media/;
        expires 7d;
    }

    # ── SSE (Executive Summary streaming) ─────────────────────────────────────
    location /dashboard/summary/stream/ {
        proxy_pass          http://infinitee_app;
        proxy_http_version  1.1;
        proxy_set_header    Connection '';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  300s;
        chunked_transfer_encoding on;
    }

    # ── Django App ────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://infinitee_app;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 20M;
    }

    # ── Block sensitive paths ─────────────────────────────────────────────────
    location ~ /\. { deny all; }
    location = /robots.txt { return 200 "User-agent: *\nDisallow: /\n"; }
}
